<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#070709">
<title>Nexca 運営管理画面</title>
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<style>
:root{--bg:#070709;--panel:#111119;--panel2:#1a1a26;--line:rgba(255,255,255,.08);--red:#ff1744;--green:#00e5a0;--yellow:#ffbe00;--blue:#4d9fff;--txt:#f4f4fb;--dim:#7777a8}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:var(--bg);color:var(--txt);font-family:"Hiragino Sans","Noto Sans JP",sans-serif;overflow:hidden}
button,select,input,textarea{font-family:inherit}
#auth,#denied{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;padding:24px;background:linear-gradient(180deg,#070709,#11111b);z-index:20}
.auth-card{width:min(360px,100%);background:var(--panel);border:1px solid var(--line);border-radius:18px;padding:22px}
.logo{font-size:30px;font-weight:1000;letter-spacing:-1px}.logo span{color:var(--red)}
.sub{font-size:12px;color:var(--dim);line-height:1.7;margin:8px 0 18px}
.gbtn,.main-btn{width:100%;border:0;border-radius:12px;padding:13px 16px;font-weight:900;font-size:14px;cursor:pointer}
.gbtn{background:white;color:#111}.main-btn{background:var(--red);color:white}
#app{height:100%;display:none;grid-template-rows:auto auto 1fr}
#app.on{display:grid}
header{padding:calc(env(safe-area-inset-top) + 12px) 14px 12px;border-bottom:1px solid var(--line);background:rgba(7,7,9,.96);backdrop-filter:blur(18px);display:flex;align-items:center;gap:10px}
.badge{font-size:10px;font-weight:900;color:var(--yellow);border:1px solid rgba(255,190,0,.22);background:rgba(255,190,0,.1);border-radius:999px;padding:4px 9px}
.spacer{flex:1}.user{font-size:11px;color:var(--dim);max-width:150px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout{border:1px solid var(--line);background:rgba(255,255,255,.05);color:var(--txt);border-radius:999px;padding:8px 10px;font-size:11px;font-weight:900}
.tabs{display:flex;gap:8px;overflow-x:auto;padding:10px 14px;border-bottom:1px solid var(--line);scrollbar-width:none}.tabs::-webkit-scrollbar{display:none}
.tab{flex:0 0 auto;border:1px solid var(--line);background:rgba(255,255,255,.045);color:var(--dim);border-radius:999px;padding:9px 12px;font-size:12px;font-weight:900}
.tab.on{background:var(--red);border-color:var(--red);color:white}
main{overflow-y:auto;padding:12px 14px 80px}
.kpis{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px}.kpi{background:var(--panel);border:1px solid var(--line);border-radius:14px;padding:12px}.kpi-n{font-size:26px;font-weight:1000}.kpi-l{font-size:10px;color:var(--dim);margin-top:3px}
.card{background:var(--panel);border:1px solid var(--line);border-radius:16px;padding:13px;margin-bottom:10px}
.top{display:flex;gap:10px;align-items:flex-start}.em{width:44px;height:44px;border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:22px;background:linear-gradient(135deg,#221128,#111827);flex-shrink:0}.title{font-size:14px;font-weight:1000;line-height:1.35}.meta{font-size:11px;color:var(--dim);line-height:1.7;margin-top:4px}.desc{font-size:12px;color:rgba(255,255,255,.78);line-height:1.75;margin-top:8px}.url{font-size:10px;color:var(--blue);word-break:break-all;margin-top:5px}
.pill{display:inline-flex;border-radius:999px;padding:3px 8px;font-size:9px;font-weight:900;margin:8px 6px 0 0}.pending{background:rgba(255,190,0,.12);color:var(--yellow)}.published{background:rgba(0,229,160,.12);color:var(--green)}.rejected{background:rgba(255,23,68,.12);color:var(--red)}.free{background:rgba(255,255,255,.08);color:var(--dim)}.paid{background:rgba(255,190,0,.14);color:var(--yellow);border:1px solid rgba(255,190,0,.22)}
.review-grid{display:grid;grid-template-columns:1fr;gap:8px;margin-top:11px}.select,.note{width:100%;background:var(--panel2);border:1px solid var(--line);border-radius:11px;color:var(--txt);padding:11px;font-size:12px}.note{min-height:72px;resize:vertical;line-height:1.6}
.actions{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:9px}.approve{background:var(--green);color:#03120d}.reject{background:var(--red);color:white}.ghost{background:rgba(255,255,255,.07);color:var(--txt)}.actions button{border:0;border-radius:11px;padding:12px 8px;font-size:12px;font-weight:1000}
.empty{text-align:center;color:var(--dim);padding:28px 10px;font-size:13px;line-height:1.7}
.screen{display:none}.screen.on{display:block}
@media (min-width:820px){.kpis{grid-template-columns:repeat(4,1fr)}main{max-width:1040px;width:100%;margin:0 auto}.review-grid{grid-template-columns:1fr 1fr}.actions{grid-template-columns:1fr 1fr 1fr}.card{padding:16px}}
</style>
</head>
<body>
<div id="auth"><div class="auth-card"><div class="logo">NEX<span>CA</span></div><div class="sub">運営管理画面。主催者から届いた掲載申請を確認し、承認・差戻し・データプラン設定を行います。</div><button class="gbtn" onclick="login()">Googleでログイン</button></div></div>
<div id="denied" style="display:none;"><div class="auth-card"><div class="logo">ACCESS <span>DENIED</span></div><div class="sub">このアカウントにはNexca運営権限がありません。Supabaseのprofilesでrole=adminまたはis_admin=trueを設定してください。</div><button class="main-btn" onclick="logout()">ログアウト</button></div></div>
<div id="app">
  <header><div class="logo" style="font-size:20px;">NEX<span>CA</span></div><div class="badge">ADMIN</div><div class="spacer"></div><div class="user" id="admin-email"></div><button class="logout" onclick="logout()">ログアウト</button></header>
  <div class="tabs"><button class="tab on" onclick="tab('pending',this)">審査待ち</button><button class="tab" onclick="tab('published',this)">公開中</button><button class="tab" onclick="tab('rejected',this)">差戻し</button><button class="tab" onclick="tab('all',this)">全体</button></div>
  <main>
    <div class="kpis"><div class="kpi"><div class="kpi-n" id="k-pending">0</div><div class="kpi-l">審査待ち</div></div><div class="kpi"><div class="kpi-n" id="k-published">0</div><div class="kpi-l">公開中</div></div><div class="kpi"><div class="kpi-n" id="k-paid">0</div><div class="kpi-l">有料データ</div></div><div class="kpi"><div class="kpi-n" id="k-total">0</div><div class="kpi-l">総申請</div></div></div>
    <section id="screen-pending" class="screen on"></section>
    <section id="screen-published" class="screen"></section>
    <section id="screen-rejected" class="screen"></section>
    <section id="screen-all" class="screen"></section>
  </main>
</div>
<script>
const SUPABASE_URL='https://umbscalpmmofbzfpmhhr.supabase.co';
const SUPABASE_ANON='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InVtYnNjYWxwbW1vZmJ6ZnBtaGhyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ3MTIwNDMsImV4cCI6MjA5MDI4ODA0M30.lgI836TkVP8EqxgIVH8FHCz8iQ87cJZikkw9S9W49Ic';
const ADMIN_EMAILS=['taichi102433@gmail.com','taichi102433-art@gmail.com','taichi102433.art@gmail.com'];
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON);
let user=null, rows=[], realtime=null;
const $=s=>document.querySelector(s);
const safe=s=>String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
function statusOf(e){return e.status||((e.is_active&&e.show_in_feed)?'published':'pending_review')}
function planOf(e){return e.data_plan||'free'}
async function login(){await sb.auth.signInWithOAuth({provider:'google',options:{redirectTo:location.origin+location.pathname}})}
async function logout(){await sb.auth.signOut();location.reload()}
async function isAdmin(){
  if(!user)return false;
  if(ADMIN_EMAILS.includes(String(user.email||'').toLowerCase()))return true;
  try{const r=await sb.from('profiles').select('role,is_admin').eq('user_id',user.id).maybeSingle();return !!(r.data&&(r.data.role==='admin'||r.data.is_admin===true));}catch(e){return false}
}
async function boot(session){
  user=session?.user||null;
  if(!user){$('#auth').style.display='flex';$('#app').classList.remove('on');return}
  $('#auth').style.display='none';$('#admin-email').textContent=user.email||'';
  if(!await isAdmin()){$('#denied').style.display='flex';return}
  $('#denied').style.display='none';$('#app').classList.add('on');
  await load(); subscribe();
}
async function load(){
  try{const r=await sb.from('events').select('*').order('created_at',{ascending:false}).limit(200);rows=r.data||[];}catch(e){rows=[]}
  render();
}
function subscribe(){
  if(realtime)return;
  try{realtime=sb.channel('admin-events').on('postgres_changes',{event:'*',schema:'public',table:'events'},()=>load()).subscribe();}catch(e){}
}
function tab(name,btn){document.querySelectorAll('.tab').forEach(b=>b.classList.remove('on'));btn.classList.add('on');document.querySelectorAll('.screen').forEach(s=>s.classList.remove('on'));$('#screen-'+name).classList.add('on')}
function render(){
  $('#k-pending').textContent=rows.filter(e=>statusOf(e)==='pending_review').length;
  $('#k-published').textContent=rows.filter(e=>statusOf(e)==='published').length;
  $('#k-paid').textContent=rows.filter(e=>planOf(e)==='paid').length;
  $('#k-total').textContent=rows.length;
  renderList('pending',rows.filter(e=>statusOf(e)==='pending_review'));
  renderList('published',rows.filter(e=>statusOf(e)==='published'));
  renderList('rejected',rows.filter(e=>statusOf(e)==='rejected'));
  renderList('all',rows);
}
function renderList(name,list){
  const el=$('#screen-'+name);
  if(!list.length){el.innerHTML='<div class="empty">対象データはありません</div>';return}
  el.innerHTML=list.map(card).join('');
}
function card(e){
  const st=statusOf(e), plan=planOf(e), id=e.id;
  return `<div class="card"><div class="top"><div class="em">${safe(e.genre_emoji||e.emoji||'🎉')}</div><div style="flex:1;min-width:0;"><div class="title">${safe(e.title)}</div><div class="meta">${safe(e.genre_label||e.genre||'イベント')} / ${safe(e.location||'場所未設定')} / ${safe(e.price||'料金未設定')}<br>主催者ID: ${safe(e.organizer_id||'-')}</div><span class="pill ${st==='published'?'published':st==='rejected'?'rejected':'pending'}">${st==='published'?'公開中':st==='rejected'?'差戻し':'審査待ち'}</span><span class="pill ${plan==='paid'?'paid':'free'}">${plan==='paid'?'有料データ':'無料データ'}</span></div></div><div class="desc">${safe(e.description||'説明なし')}</div>${e.video_url?`<div class="url">動画: ${safe(e.video_url)}</div>`:''}${e.instagram_url?`<div class="url">Instagram: ${safe(e.instagram_url)}</div>`:''}${e.website_url?`<div class="url">公式: ${safe(e.website_url)}</div>`:''}${e.booking_url?`<div class="url">予約: ${safe(e.booking_url)}</div>`:''}${e.char_name||e.char_image_url?`<div class="url">独自キャラ: ${safe(e.char_name||'名称未設定')} ${safe(e.char_desc||'')}</div>${e.char_image_url?`<div class="url">画像: ${safe(e.char_image_url)}</div>`:''}`:''}<div class="review-grid"><select class="select" id="plan-${id}"><option value="free" ${plan!=='paid'?'selected':''}>無料データ</option><option value="paid" ${plan==='paid'?'selected':''}>有料データ</option></select><textarea class="note" id="note-${id}" placeholder="運営メモ / 差戻し理由">${safe(e.rejection_reason||e.review_note||'')}</textarea></div><div class="actions"><button class="approve" onclick="approve('${id}')">承認して公開</button><button class="reject" onclick="rejectEvent('${id}')">差戻し</button><button class="ghost" onclick="archiveEvent('${id}')">非公開</button></div></div>`;
}
async function approve(id){
  const plan=$('#plan-'+id)?.value||'free', note=$('#note-'+id)?.value||'';
  let r=await sb.from('events').update({status:'published',data_plan:plan,review_note:note,is_active:true,show_in_feed:true,reviewed_at:new Date().toISOString(),reviewed_by:user.id,rejection_reason:null}).eq('id',id);
  if(r.error&&String(r.error.message).includes('data_plan'))r=await sb.from('events').update({status:'published',is_active:true,show_in_feed:true,reviewed_at:new Date().toISOString(),reviewed_by:user.id,rejection_reason:null}).eq('id',id);
  if(r.error&&String(r.error.message).includes('status'))r=await sb.from('events').update({is_active:true,show_in_feed:true}).eq('id',id);
  await load();
}
async function rejectEvent(id){
  const reason=$('#note-'+id)?.value||prompt('差戻し理由','内容を確認して再送信してください')||'内容を確認して再送信してください';
  let r=await sb.from('events').update({status:'rejected',is_active:false,show_in_feed:false,rejection_reason:reason,reviewed_at:new Date().toISOString(),reviewed_by:user.id}).eq('id',id);
  if(r.error&&String(r.error.message).includes('status'))r=await sb.from('events').update({is_active:false,show_in_feed:false}).eq('id',id);
  await load();
}
async function archiveEvent(id){
  let r=await sb.from('events').update({status:'archived',is_active:false,show_in_feed:false,reviewed_at:new Date().toISOString(),reviewed_by:user.id}).eq('id',id);
  if(r.error&&String(r.error.message).includes('status'))r=await sb.from('events').update({is_active:false,show_in_feed:false}).eq('id',id);
  await load();
}
sb.auth.onAuthStateChange((_,session)=>boot(session));
sb.auth.getSession().then(({data:{session}})=>boot(session));
</script>
</body>
</html>
